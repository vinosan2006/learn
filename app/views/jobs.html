<!DOCTYPE html>
<html>
<head>
    <title>Job Roles | LearnHub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="close-btn" onclick="closeNav()">&times;</a>
        <a href="#">My Profile</a>
        <a href="{{ url_for('course.enrolled') }}">Enrolled Courses (My Progress)</a>
        <a href="{{ url_for('course.jobs') }}">Job Roles</a>
        <a href="#">Settings</a>
        <a href="{{ url_for('auth.logout') }}">Logout</a>
    </div>

    <div id="main" class="page-container">
        <div class="navbar">
            <div class="navbar-left">
                <span class="hamburger" onclick="openNav()">&#9776;</span>
                <div class="logo">LearnHub</div>
            </div>
            <nav>
                <a href="{{ url_for('auth.home') }}">Home</a>
                <a href="{{ url_for('course.courses') }}">Courses</a>
                <a href="{{ url_for('course.enrolled') }}">My Progress</a>
                <a href="{{ url_for('course.jobs') }}">Job Roles</a>
                <a href="{{ url_for('auth.logout') }}" class="logout-btn">Logout</a>
            </nav>
        </div>

        <div class="container" style="padding: 40px;">
            <h1 class="page-title" style="margin-bottom: 30px;">Recommended Jobs</h1>
            <div style="max-width: 800px; margin: 0 auto;">
                {% for job in jobs %}
                <div class="job-role-item" style="background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid #22c55e;">
                    <h3 style="color: #22c55e; margin-bottom: 5px;">{{ job.title }}</h3>
                    <p style="margin: 10px 0; color: #d1d5db;">{{ job.desc }}</p>
                    <div class="buttons" style="justify-content: flex-start; gap: 10px;">
                        {% for tag in job.tags %}
                        <span class="pill-btn" style="font-size: 12px; padding: 4px 12px; background: #334155; color: #cbd5e1; border-radius: 20px; display: inline-block;">{{ tag }}</span>
                        {% endfor %}
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <script>
        function openNav() {
            document.getElementById("mySidebar").style.width = "250px";
        }
        function closeNav() {
            document.getElementById("mySidebar").style.width = "0";
        }
    </script>
</body>
</html>
